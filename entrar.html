<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/login.css">
    <title>Login</title>
</head>
<body>
    <main>
        <div class="container">
            <h1>Entrar</h1>
            <form action="#">
                <div class="input">
                    <label for="email"></label>
                    <input type="email" id="email" name="email" placeholder="Coloque seu E-mail" required class="cadastro"><br>
                </div>

                <div class="input">
                    <label for="password"></label>
                    <input type="password" id="password" name="password" placeholder="Insira sua senha" required class="cadastro"><br>
                </div>

                <div>
                    <input type="submit" value="Enviar" class="btn">
                    <input type="reset" value="Limpar" class="btn">
                </div>

                <p>Esqueceu sua senha? <small><a href="#">Clique aqui</a></small></p>
            </form>
        </div>
    </main>
</body>
</html>
